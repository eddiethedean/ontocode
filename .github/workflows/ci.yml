name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build -p ontoindex-lsp --bins

      - run: cargo test --workspace

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.86

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - run: cargo build -p ontoindex-lsp --bins

      - run: cargo test --workspace

  smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: |
          set -euo pipefail
          cargo run -- query fixtures "SELECT * FROM classes"
          cargo run -- validate fixtures
          cargo run -- sparql fixtures "SELECT ?s WHERE { ?s ?p ?o } LIMIT 1"

  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - run: cargo build --release --locked -p ontoindex-cli -p ontoindex-lsp --bins

      - run: ./target/release/ontoindex inspect fixtures

  lsp-build:
    name: LSP build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --locked -p ontoindex-lsp --bins

      - run: cargo test -p ontocode --test lsp_smoke

  extension-build:
    name: extension build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
        working-directory: extension

      - run: npm run compile
        working-directory: extension

      - run: npm test
        working-directory: extension

  package:
    name: crate packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: |
          set -euo pipefail
          # Full crate graph is verified at release (publish in dependency order on tag).
          cargo publish -p ontoindex-core --dry-run
