name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  doc-versions:
    name: documentation version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: chmod +x scripts/check-doc-versions.sh
      - run: ./scripts/check-doc-versions.sh

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build -p ontoindex-lsp -p ontoindex-cli --bins

      - run: cargo test --workspace

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - run: cargo build -p ontoindex-lsp -p ontoindex-cli --bins

      - run: cargo test --workspace

  smoke:
    name: CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: |
          set -euo pipefail
          cargo run -- query fixtures "SELECT * FROM classes"
          cargo run -- validate fixtures
          cargo run -- query fixtures "SELECT code FROM diagnostics"
          cargo run -- sparql fixtures "SELECT ?s WHERE { ?s ?p ?o } LIMIT 1"

  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - run: cargo build --release --locked -p ontoindex-cli -p ontoindex-lsp --bins

      - run: ./target/release/ontoindex inspect fixtures

  lsp-build:
    name: LSP build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --locked -p ontoindex-lsp --bins

      - run: cargo test -p ontocode --test lsp_smoke

      - run: cargo test -p ontocode --test lsp_reasoner

  extension-build:
    name: extension build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build ontoindex-lsp for extension e2e tests
        run: cargo build -p ontoindex-lsp --bins

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
        working-directory: extension

      - run: npm run compile
        working-directory: extension

      - name: Extension unit and bundled-LSP e2e tests
        run: npm test
        working-directory: extension
        env:
          ONTOINDEX_LSP_BIN: ${{ github.workspace }}/target/debug/ontoindex-lsp

      - name: VSIX unpack spawn e2e (Marketplace chmod regression)
        run: |
          set -euo pipefail
          PLATFORM=linux-x64
          mkdir -p "extension/server/${PLATFORM}"
          cp target/debug/ontoindex-lsp "extension/server/${PLATFORM}/ontoindex-lsp"
          chmod +x "extension/server/${PLATFORM}/ontoindex-lsp"
          cd extension
          npx vsce package --no-dependencies -o /tmp/ontocode-ci.vsix
          rm -rf /tmp/ontocode-vsix-unpack
          unzip -q /tmp/ontocode-ci.vsix -d /tmp/ontocode-vsix-unpack
          export ONTOCODE_E2E_EXTENSION_ROOT=/tmp/ontocode-vsix-unpack/extension
          npm test
        env:
          ONTOINDEX_LSP_BIN: ${{ github.workspace }}/target/debug/ontoindex-lsp

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - run: cargo audit

  package:
    name: crate packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: |
          set -euo pipefail
          # Full crate graph is verified at release (publish in dependency order on tag).
          cargo publish -p ontoindex-core --dry-run
          # Dependent crates cannot `publish --dry-run` until workspace deps exist on crates.io.
          cargo build -p ontoindex-diagnostics -p ontoindex-owl -p ontoindex-cli

  docs:
    name: mkdocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        run: mkdocs build --strict
