name: Extension VS Code E2E

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: vscode-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vscode-e2e:
    name: VS Code ${{ matrix.vscode }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported engine (extension/package.json: ^1.85.0)
          - os: ubuntu-latest
            platform: linux-x64
            vscode: "1.85.0"
          - os: macos-latest
            platform: darwin-arm64
            vscode: "1.85.0"
          - os: windows-latest
            platform: win32-x64
            vscode: "1.85.0"
          # Current stable
          - os: ubuntu-latest
            platform: linux-x64
            vscode: stable
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            vscode: stable
          - os: macos-latest
            platform: darwin-arm64
            vscode: stable
          - os: windows-latest
            platform: win32-x64
            vscode: stable

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: vscode-e2e-${{ matrix.platform }}

      - name: Build ontocore-lsp
        run: cargo build -p ontocore-lsp --bins

      - name: Bundle LSP for extension platform
        shell: bash
        run: ./scripts/prepare-extension-server.sh "${{ matrix.platform }}"

      - name: Simulate Marketplace stripping execute bit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: chmod -x "extension/server/${{ matrix.platform }}/ontocore-lsp"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build extension
        working-directory: extension
        run: |
          npm run compile
          npm run compile:vscode-test

      - name: Cache VS Code test download
        uses: actions/cache@v4
        with:
          path: extension/.vscode-test
          key: vscode-test-${{ matrix.platform }}-${{ matrix.vscode }}-${{ hashFiles('extension/package-lock.json') }}
          restore-keys: |
            vscode-test-${{ matrix.platform }}-${{ matrix.vscode }}-
            vscode-test-${{ matrix.platform }}-

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run VS Code extension e2e
        working-directory: extension
        shell: bash
        env:
          VSCODE_VERSION: ${{ matrix.vscode }}
        run: |
          set -euo pipefail
          run_e2e() {
            if [ "${{ runner.os }}" = "Linux" ]; then
              xvfb-run -a npm run test:vscode
            else
              npm run test:vscode
            fi
          }
          for attempt in 1 2 3; do
            echo "VS Code e2e attempt ${attempt}/3..."
            if run_e2e; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Retrying after transient failure (often VS Code download)..."
              sleep 30
            fi
          done
          exit 1
