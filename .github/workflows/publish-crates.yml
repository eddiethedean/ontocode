# Manual crates.io republish (e.g. after a partial release publish failure).
# Skips versions that already exist. Uses the same dependency order as Release.
name: Publish crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-publish

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          INDEX_RETRY_SECONDS: 30
          RATE_LIMIT_RETRY_SECONDS: 60
        run: |
          set -euo pipefail

          rate_limit_sleep_seconds() {
            local output="$1"
            local default="${RATE_LIMIT_RETRY_SECONDS}"
            local secs
            secs=$(echo "${output}" | grep -oiE 'retry-after:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
            if [ -n "${secs}" ]; then
              echo "${secs}"
              return
            fi
            local when
            when=$(echo "${output}" | grep -oiE 'try again after [^[:space:]].+' | head -1 | sed -E 's/[Pp]lease try again after //;s/\..*//;s/[[:space:]]+$//' || true)
            if [ -n "${when}" ]; then
              local target now delta
              target=$(date -u -d "${when}" +%s 2>/dev/null || date -u -j -f "%a, %d %b %Y %H:%M:%S %Z" "${when}" +%s 2>/dev/null || true)
              now=$(date -u +%s)
              if [ -n "${target}" ] && [ "${target}" -gt "${now}" ]; then
                delta=$((target - now + 2))
                echo "${delta}"
                return
              fi
            fi
            echo "${default}"
          }

          publish_crate() {
            local crate="$1"
            local attempt output wait_secs
            for attempt in 1 2 3 4 5 6 7 8; do
              echo "Publishing ${crate} (attempt ${attempt})..."
              if output=$(cargo publish -p "${crate}" --locked --no-verify 2>&1); then
                echo "${output}"
                echo "Published ${crate}"
                rm -rf target/package
                return 0
              fi
              echo "${output}"
              if echo "${output}" | grep -qE 'already exists on crates.io index|crate version .* is already uploaded|is already uploaded'; then
                echo "Skipping ${crate}: version already published"
                rm -rf target/package
                return 0
              fi
              if echo "${output}" | grep -qE 'status 400 Bad Request|expected at most'; then
                echo "Non-retryable publish error for ${crate}"
                return 1
              fi
              if echo "${output}" | grep -qE 'status 429 Too Many Requests|published too many new crates|published too many crate versions'; then
                wait_secs=$(rate_limit_sleep_seconds "${output}")
                echo "Rate limited by crates.io; waiting ${wait_secs}s..."
                sleep "${wait_secs}"
                continue
              fi
              if [ "${attempt}" -lt 8 ]; then
                echo "Waiting ${INDEX_RETRY_SECONDS}s for crates.io index to update..."
                sleep "${INDEX_RETRY_SECONDS}"
              fi
            done
            echo "Failed to publish ${crate}"
            return 1
          }

          publish_crate ontocore-core
          publish_crate ontocore-parser
          publish_crate ontocore-owl
          publish_crate ontocore-obo
          publish_crate ontocore-edit
          publish_crate ontocore-diagnostics
          publish_crate ontocore-catalog
          publish_crate ontocore-diff
          publish_crate ontocore-docs
          # refactor depends on ontocore-swrl
          publish_crate ontocore-swrl
          publish_crate ontocore-refactor
          publish_crate ontocore-query
          publish_crate ontocore-reasoner
          publish_crate ontocore-robot
          publish_crate ontocore-plugin
          publish_crate ontocore-plugin-naming
          publish_crate ontocore-plugin-markdown-export
          publish_crate ontocore-plugin-shacl
          publish_crate ontocore-plugin-builtins
          publish_crate ontocore-lsp
          publish_crate ontocore
          publish_crate ontocore-cli
