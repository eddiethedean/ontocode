name: Read the Docs

on:
  push:
    branches:
      - "release/v*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git branch or tag (e.g. release/v0.13.0 or v0.13.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  activate-version:
    name: activate RTD version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Activate Read the Docs version
        env:
          READTHEDOCS_API_TOKEN: ${{ secrets.READTHEDOCS_API_TOKEN }}
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          chmod +x scripts/readthedocs-activate-version.sh
          ./scripts/readthedocs-activate-version.sh "$REF"
