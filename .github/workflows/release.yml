name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  preflight:
    name: Preflight (CI gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same reclaim as CI test/MSRV jobs — clippy --all-features + workspace
      # tests otherwise exhaust the ~14GB runner disk (v0.18.0 release failure).
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preflight

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: Documentation version sync
        run: |
          set -euo pipefail
          chmod +x scripts/check-doc-versions.sh
          ./scripts/check-doc-versions.sh

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Drop the all-features clippy tree before test profile rebuilds.
      - name: Reclaim disk after clippy
        run: |
          set -euo pipefail
          cargo clean
          df -h

      - name: Build core binaries (cached for tests)
        run: cargo build -p ontocore-lsp -p ontocore-cli --bins

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: MkDocs (strict)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs deps
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
        run: mkdocs build --strict

      - name: Webview UI tests
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/webview-ui/package-lock.json

      - run: npm ci
        working-directory: extension/webview-ui

      - run: npm test
        working-directory: extension/webview-ui

      - name: Extension build + tests (bundled LSP)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
        working-directory: extension

      - run: npm run compile
        working-directory: extension

      - name: Extension unit and bundled-LSP e2e tests
        run: npm test
        working-directory: extension
        env:
          ONTOCORE_LSP_BIN: ${{ github.workspace }}/target/debug/ontocore-lsp

      - name: cargo audit
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked
          cargo audit

      - name: Crate packaging (dry-run + build sanity)
        run: |
          set -euo pipefail
          # Only leaf crates (no unpublished path deps) can dry-run here.
          # Full graph is published in dependency order on release tags.
          cargo publish -p ontocore-core --dry-run
          cargo publish -p ontocore-robot --dry-run
          cargo build -p ontocore-diagnostics -p ontocore-owl -p ontocore-cli -p ontocore

      - name: CLI smoke
        run: |
          set -euo pipefail
          cargo run -- query fixtures "SELECT * FROM classes"
          cargo run -- validate fixtures
          cargo run -- query fixtures "SELECT code FROM diagnostics"
          cargo run -- sparql fixtures "SELECT ?s WHERE { ?s ?p ?o } LIMIT 1"

  build-lsp:
    name: LSP (${{ matrix.bundle_dir }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            bundle_dir: linux-x64
            rust_target: ""
            binary_ext: ""
          - runner: ubuntu-24.04-arm
            bundle_dir: linux-arm64
            rust_target: ""
            binary_ext: ""
          - runner: macos-latest
            bundle_dir: darwin-arm64
            rust_target: ""
            binary_ext: ""
          - runner: macos-latest
            bundle_dir: darwin-x64
            rust_target: x86_64-apple-darwin
            binary_ext: ""
          - runner: windows-latest
            bundle_dir: win32-x64
            rust_target: ""
            binary_ext: .exe
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-lsp-${{ matrix.bundle_dir }}

      - name: Build ontocore-lsp
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release -p ontocore-lsp --bins --target "${{ matrix.rust_target }}"
            BIN="target/${{ matrix.rust_target }}/release/ontocore-lsp${{ matrix.binary_ext }}"
          else
            cargo build --release -p ontocore-lsp --bins
            BIN="target/release/ontocore-lsp${{ matrix.binary_ext }}"
          fi
          mkdir -p "bundle/${{ matrix.bundle_dir }}"
          cp "${BIN}" "bundle/${{ matrix.bundle_dir }}/ontocore-lsp${{ matrix.binary_ext }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "bundle/${{ matrix.bundle_dir }}/ontocore-lsp${{ matrix.binary_ext }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ matrix.bundle_dir }}
          path: bundle/
          retention-days: 1

  release:
    needs: [preflight, build-lsp]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION=$(awk '/^\[workspace.package\]/{found=1} found && /^version = /{print $3; exit}' Cargo.toml | tr -d '"')
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} (v${TAG_VERSION}) does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      # Full workspace tests run on main in CI; release stays lean to avoid runner disk exhaustion.
      - name: Verify release binaries build
        run: cargo build --release --locked -p ontocore-cli -p ontocore --bins

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PUBLISH_PAUSE_SECONDS: 120
          INDEX_RETRY_SECONDS: 60
          RATE_LIMIT_RETRY_SECONDS: 180
        run: |
          set -euo pipefail
          echo "Disk before crate publish:"
          df -h

          wait_between_crates() {
            echo "Waiting ${PUBLISH_PAUSE_SECONDS}s before next crate (crates.io new-crate rate limit)..."
            sleep "${PUBLISH_PAUSE_SECONDS}"
          }

          publish_crate() {
            local crate="$1"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "Publishing ${crate} (attempt ${attempt})..."
              if output=$(cargo publish -p "${crate}" --locked 2>&1); then
                echo "${output}"
                echo "Published ${crate}"
                echo "new" > "/tmp/publish-${crate}"
                rm -rf target/package
                return 0
              fi
              echo "${output}"
              if echo "${output}" | grep -qE 'already exists on crates.io index'; then
                echo "Skipping ${crate}: version already published"
                echo "skip" > "/tmp/publish-${crate}"
                rm -rf target/package
                return 0
              fi
              if echo "${output}" | grep -qE 'status 400 Bad Request|expected at most'; then
                echo "Non-retryable publish error for ${crate}"
                return 1
              fi
              if echo "${output}" | grep -qE 'status 429 Too Many Requests|published too many new crates'; then
                echo "Rate limited by crates.io; waiting ${RATE_LIMIT_RETRY_SECONDS}s..."
                sleep "${RATE_LIMIT_RETRY_SECONDS}"
                continue
              fi
              if [ "${attempt}" -lt 6 ]; then
                echo "Waiting ${INDEX_RETRY_SECONDS}s for crates.io index to update..."
                sleep "${INDEX_RETRY_SECONDS}"
              fi
            done
            echo "Failed to publish ${crate}"
            return 1
          }

          publish_with_pause() {
            local crate="$1"
            publish_crate "${crate}"
            if [ "$(cat "/tmp/publish-${crate}")" = "new" ]; then
              wait_between_crates
            fi
          }

          publish_with_pause ontocore-core
          publish_with_pause ontocore-parser
          publish_with_pause ontocore-owl
          publish_with_pause ontocore-obo
          publish_with_pause ontocore-edit
          publish_with_pause ontocore-diagnostics
          publish_with_pause ontocore-catalog
          publish_with_pause ontocore-diff
          publish_with_pause ontocore-docs
          publish_with_pause ontocore-refactor
          publish_with_pause ontocore-query
          publish_with_pause ontocore-reasoner
          publish_with_pause ontocore-robot
          publish_with_pause ontocore-plugin
          publish_with_pause ontocore-plugin-naming
          publish_with_pause ontocore-plugin-markdown-export
          publish_with_pause ontocore-plugin-shacl
          publish_with_pause ontocore-plugin-builtins
          publish_with_pause ontocore-lsp
          publish_with_pause ontocore
          publish_crate ontocore-cli

          cargo clean
          echo "Disk after crate publish:"
          df -h

      - name: Build CLI binary
        run: cargo build --release --locked -p ontocore-cli

      - name: Download multi-platform LSP binaries
        uses: actions/download-artifact@v4
        with:
          pattern: lsp-*
          path: extension/server
          merge-multiple: true

      - name: Package standalone binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/ontocore "dist/ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          tar -czf "dist/ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist "ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"

          for dir in extension/server/*/; do
            platform="$(basename "${dir}")"
            bin="${dir}ontocore-lsp"
            exe="${dir}ontocore-lsp.exe"
            if [ -f "${bin}" ]; then
              cp "${bin}" "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}"
              tar -czf "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}.tar.gz" \
                -C dist "ontocore-lsp-${GITHUB_REF_NAME}-${platform}"
            elif [ -f "${exe}" ]; then
              cp "${exe}" "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}.exe"
              (cd dist && zip -q "ontocore-lsp-${GITHUB_REF_NAME}-${platform}.zip" \
                "ontocore-lsp-${GITHUB_REF_NAME}-${platform}.exe")
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Build multi-platform VSIX
        run: |
          set -euo pipefail
          echo "Disk before VSIX packaging:"
          df -h
          ls -la extension/server/
          cd extension
          npm ci
          npm run compile
          npx vsce package --no-dependencies -o "../dist/ontocode-${GITHUB_REF_NAME}.vsix"
          rm -rf node_modules webview-ui/node_modules
          echo "Disk after VSIX packaging:"
          df -h

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "::warning::OVSX_PAT secret is not set; skipping Open VSX publish"
            exit 0
          fi
          npm install -g ovsx
          ovsx publish "dist/ontocode-${GITHUB_REF_NAME}.vsix" -p "${OVSX_PAT}"

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cp NOTICES dist/NOTICES
          cd dist
          shopt -s nullglob
          sha256sum *.tar.gz *.zip *.vsix > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/*.vsix dist/SHA256SUMS dist/NOTICES)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading assets"
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "OntoCode ${GITHUB_REF_NAME}" \
              --generate-notes \
              "${assets[@]}"
          fi
