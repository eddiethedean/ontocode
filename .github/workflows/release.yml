name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION=$(awk '/^\[workspace.package\]/{found=1} found && /^version = /{print $3; exit}' Cargo.toml | tr -d '"')
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} (v${TAG_VERSION}) does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

      - name: Verify crate metadata (dry-run publish)
        run: cargo publish -p ontoindex-core --dry-run

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: cargo test
        run: |
          cargo build -p ontoindex-lsp --bins
          cargo test --workspace

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # crates.io limits how many new crates can be published in a short window
          PUBLISH_PAUSE_SECONDS: 120
          INDEX_RETRY_SECONDS: 60
          RATE_LIMIT_RETRY_SECONDS: 180
        run: |
          set -euo pipefail

          wait_between_crates() {
            echo "Waiting ${PUBLISH_PAUSE_SECONDS}s before next crate (crates.io new-crate rate limit)..."
            sleep "${PUBLISH_PAUSE_SECONDS}"
          }

          publish_crate() {
            local crate="$1"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "Publishing ${crate} (attempt ${attempt})..."
              if output=$(cargo publish -p "${crate}" --locked 2>&1); then
                echo "${output}"
                echo "Published ${crate}"
                echo "new" > "/tmp/publish-${crate}"
                return 0
              fi
              echo "${output}"
              if echo "${output}" | grep -qE 'already exists on crates.io index'; then
                echo "Skipping ${crate}: version already published"
                echo "skip" > "/tmp/publish-${crate}"
                return 0
              fi
              if echo "${output}" | grep -qE 'status 400 Bad Request|expected at most'; then
                echo "Non-retryable publish error for ${crate}"
                return 1
              fi
              if echo "${output}" | grep -qE 'status 429 Too Many Requests|published too many new crates'; then
                echo "Rate limited by crates.io; waiting ${RATE_LIMIT_RETRY_SECONDS}s..."
                sleep "${RATE_LIMIT_RETRY_SECONDS}"
                continue
              fi
              if [ "${attempt}" -lt 6 ]; then
                echo "Waiting ${INDEX_RETRY_SECONDS}s for crates.io index to update..."
                sleep "${INDEX_RETRY_SECONDS}"
              fi
            done
            echo "Failed to publish ${crate}"
            return 1
          }

          publish_with_pause() {
            local crate="$1"
            publish_crate "${crate}"
            if [ "$(cat "/tmp/publish-${crate}")" = "new" ]; then
              wait_between_crates
            fi
          }

          publish_with_pause ontoindex-core
          publish_with_pause ontoindex-parser
          publish_with_pause ontoindex-catalog
          publish_with_pause ontoindex-query
          publish_with_pause ontoindex-lsp
          publish_crate ontoindex-cli

      - name: Build release binaries
        run: |
          cargo build --release -p ontoindex-cli
          cargo build --release -p ontoindex-lsp --bins

      - name: Package CLI binary
        run: |
          mkdir -p dist
          cp target/release/ontoindex "dist/ontoindex-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          tar -czf "dist/ontoindex-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist "ontoindex-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"

      - name: Package LSP binary
        run: |
          mkdir -p dist
          cp target/release/ontoindex-lsp "dist/ontoindex-lsp-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          tar -czf "dist/ontoindex-lsp-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist "ontoindex-lsp-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Build extension VSIX
        run: |
          set -euo pipefail
          mkdir -p extension/server/linux-x64
          cp target/release/ontoindex-lsp extension/server/linux-x64/ontoindex-lsp
          chmod +x extension/server/linux-x64/ontoindex-lsp
          cd extension
          npm ci
          npm run compile
          npx vsce package --no-dependencies -o "../dist/ontocode-${GITHUB_REF_NAME}.vsix"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "dist/ontoindex-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
            "dist/ontoindex-lsp-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
            "dist/ontocode-${GITHUB_REF_NAME}.vsix"
          )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading assets"
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "OntoCode ${GITHUB_REF_NAME}" \
              --generate-notes \
              "${assets[@]}"
          fi
