name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # Tag gates only — full clippy/tests/extension e2e already run on the
  # release commit via ci.yml. Re-running them here doubled wall time and
  # forced cargo clean (disk) on every tag.
  preflight:
    name: Preflight (tag gates)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches workspace version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION=$(awk '/^\[workspace.package\]/{found=1} found && /^version = /{print $3; exit}' Cargo.toml | tr -d '"')
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} (v${TAG_VERSION}) does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

      - name: Documentation version sync
        run: |
          set -euo pipefail
          chmod +x scripts/check-doc-versions.sh
          ./scripts/check-doc-versions.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: Require green CI on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Looking for successful ci.yml run on ${GITHUB_SHA}..."
          for i in $(seq 1 30); do
            json=$(gh run list --workflow=ci.yml --commit="${GITHUB_SHA}" --limit 10 \
              --json databaseId,conclusion,status,url,displayTitle)
            echo "${json}" | jq -c '.[]' || true

            if echo "${json}" | jq -e '[.[] | select(.conclusion == "success")] | length > 0' >/dev/null; then
              echo "Found successful CI run for ${GITHUB_SHA}"
              exit 0
            fi

            if echo "${json}" | jq -e '[.[] | select(.conclusion != null and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "cancelled")] | length > 0' >/dev/null \
              && ! echo "${json}" | jq -e '[.[] | select(.status == "in_progress" or .status == "queued" or .status == "pending" or .status == "waiting")] | length > 0' >/dev/null; then
              echo "CI failed on ${GITHUB_SHA}; refusing to release. Fix CI before retagging."
              exit 1
            fi

            echo "CI not green yet; waiting 30s (attempt ${i}/30)..."
            sleep 30
          done
          echo "Timed out waiting for green CI on ${GITHUB_SHA}."
          echo "Tag only after CI is green on the release commit (see docs/releasing.md)."
          exit 1

  build-lsp:
    name: LSP (${{ matrix.bundle_dir }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            bundle_dir: linux-x64
            rust_target: ""
            binary_ext: ""
          - runner: ubuntu-24.04-arm
            bundle_dir: linux-arm64
            rust_target: ""
            binary_ext: ""
          - runner: macos-latest
            bundle_dir: darwin-arm64
            rust_target: ""
            binary_ext: ""
          - runner: macos-latest
            bundle_dir: darwin-x64
            rust_target: x86_64-apple-darwin
            binary_ext: ""
          - runner: windows-latest
            bundle_dir: win32-x64
            rust_target: ""
            binary_ext: .exe
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-lsp-${{ matrix.bundle_dir }}

      - name: Build ontocore-lsp
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release -p ontocore-lsp --bins --target "${{ matrix.rust_target }}"
            BIN="target/${{ matrix.rust_target }}/release/ontocore-lsp${{ matrix.binary_ext }}"
          else
            cargo build --release -p ontocore-lsp --bins
            BIN="target/release/ontocore-lsp${{ matrix.binary_ext }}"
          fi
          mkdir -p "bundle/${{ matrix.bundle_dir }}"
          cp "${BIN}" "bundle/${{ matrix.bundle_dir }}/ontocore-lsp${{ matrix.binary_ext }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "bundle/${{ matrix.bundle_dir }}/ontocore-lsp${{ matrix.binary_ext }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ matrix.bundle_dir }}
          path: bundle/
          retention-days: 1

  # Starts as soon as tag gates pass — overlaps with the LSP matrix.
  publish-crates:
    name: Publish crates.io
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-publish

      # New versions of existing crates: burst 30, then ~1/min
      # (https://crates.io/docs/rate-limits). Do not sleep proactively —
      # only back off on 429 / index lag. --no-verify: packaging verified in CI.
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          INDEX_RETRY_SECONDS: 30
          RATE_LIMIT_RETRY_SECONDS: 60
        run: |
          set -euo pipefail
          echo "Disk before crate publish:"
          df -h

          rate_limit_sleep_seconds() {
            local output="$1"
            local default="${RATE_LIMIT_RETRY_SECONDS}"
            local secs
            secs=$(echo "${output}" | grep -oiE 'retry-after:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
            if [ -n "${secs}" ]; then
              echo "${secs}"
              return
            fi
            # Body style: "Please try again after <HTTP-date>"
            local when
            when=$(echo "${output}" | grep -oiE 'try again after [^[:space:]].+' | head -1 | sed -E 's/[Pp]lease try again after //;s/\..*//;s/[[:space:]]+$//' || true)
            if [ -n "${when}" ]; then
              local target now delta
              target=$(date -u -d "${when}" +%s 2>/dev/null || date -u -j -f "%a, %d %b %Y %H:%M:%S %Z" "${when}" +%s 2>/dev/null || true)
              now=$(date -u +%s)
              if [ -n "${target}" ] && [ "${target}" -gt "${now}" ]; then
                delta=$((target - now + 2))
                echo "${delta}"
                return
              fi
            fi
            echo "${default}"
          }

          publish_crate() {
            local crate="$1"
            local attempt output wait_secs
            for attempt in 1 2 3 4 5 6 7 8; do
              echo "Publishing ${crate} (attempt ${attempt})..."
              if output=$(cargo publish -p "${crate}" --locked --no-verify 2>&1); then
                echo "${output}"
                echo "Published ${crate}"
                rm -rf target/package
                return 0
              fi
              echo "${output}"
              if echo "${output}" | grep -qE 'already exists on crates.io index|crate version .* is already uploaded|is already uploaded'; then
                echo "Skipping ${crate}: version already published"
                rm -rf target/package
                return 0
              fi
              if echo "${output}" | grep -qE 'status 400 Bad Request|expected at most'; then
                echo "Non-retryable publish error for ${crate}"
                return 1
              fi
              if echo "${output}" | grep -qE 'status 429 Too Many Requests|published too many new crates|published too many crate versions'; then
                wait_secs=$(rate_limit_sleep_seconds "${output}")
                echo "Rate limited by crates.io; waiting ${wait_secs}s..."
                sleep "${wait_secs}"
                continue
              fi
              if [ "${attempt}" -lt 8 ]; then
                echo "Waiting ${INDEX_RETRY_SECONDS}s for crates.io index to update..."
                sleep "${INDEX_RETRY_SECONDS}"
              fi
            done
            echo "Failed to publish ${crate}"
            return 1
          }

          publish_crate ontocore-core
          publish_crate ontocore-parser
          publish_crate ontocore-owl
          publish_crate ontocore-obo
          publish_crate ontocore-edit
          publish_crate ontocore-diagnostics
          publish_crate ontocore-catalog
          publish_crate ontocore-diff
          publish_crate ontocore-docs
          # refactor depends on ontocore-swrl (must publish before refactor)
          publish_crate ontocore-swrl
          publish_crate ontocore-refactor
          publish_crate ontocore-query
          publish_crate ontocore-reasoner
          publish_crate ontocore-robot
          publish_crate ontocore-plugin
          publish_crate ontocore-plugin-naming
          publish_crate ontocore-plugin-markdown-export
          publish_crate ontocore-plugin-shacl
          publish_crate ontocore-plugin-builtins
          publish_crate ontocore-lsp
          publish_crate ontocore
          publish_crate ontocore-cli

          echo "Disk after crate publish:"
          df -h

  # Overlaps with publish-crates once LSP artifacts are ready.
  package-release:
    name: Package + GitHub Release
    needs: [preflight, build-lsp]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-package

      - name: Build CLI release binary
        run: cargo build --release --locked -p ontocore-cli --bins

      - name: Download multi-platform LSP binaries
        uses: actions/download-artifact@v4
        with:
          pattern: lsp-*
          path: extension/server
          merge-multiple: true

      - name: Package standalone binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/ontocore "dist/ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          tar -czf "dist/ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist "ontocore-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"

          for dir in extension/server/*/; do
            platform="$(basename "${dir}")"
            bin="${dir}ontocore-lsp"
            exe="${dir}ontocore-lsp.exe"
            if [ -f "${bin}" ]; then
              cp "${bin}" "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}"
              tar -czf "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}.tar.gz" \
                -C dist "ontocore-lsp-${GITHUB_REF_NAME}-${platform}"
            elif [ -f "${exe}" ]; then
              cp "${exe}" "dist/ontocore-lsp-${GITHUB_REF_NAME}-${platform}.exe"
              (cd dist && zip -q "ontocore-lsp-${GITHUB_REF_NAME}-${platform}.zip" \
                "ontocore-lsp-${GITHUB_REF_NAME}-${platform}.exe")
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Build multi-platform VSIX
        run: |
          set -euo pipefail
          echo "Disk before VSIX packaging:"
          df -h
          ls -la extension/server/
          cd extension
          npm ci
          npm run compile
          npx vsce package --no-dependencies -o "../dist/ontocode-${GITHUB_REF_NAME}.vsix"
          rm -rf node_modules webview-ui/node_modules
          echo "Disk after VSIX packaging:"
          df -h

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "::warning::OVSX_PAT secret is not set; skipping Open VSX publish"
            exit 0
          fi
          npm install -g ovsx
          ovsx publish "dist/ontocode-${GITHUB_REF_NAME}.vsix" -p "${OVSX_PAT}"

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cp NOTICES dist/NOTICES
          cd dist
          shopt -s nullglob
          sha256sum *.tar.gz *.zip *.vsix > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/*.vsix dist/SHA256SUMS dist/NOTICES)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading assets"
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "OntoCode ${GITHUB_REF_NAME}" \
              --generate-notes \
              "${assets[@]}"
          fi
