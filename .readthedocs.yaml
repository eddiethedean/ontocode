# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# Versioning: main → latest; release/v* branches and v* tags are activated by
# .github/workflows/readthedocs.yml (see docs/releasing.md).

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  environment:
    DISABLE_MKDOCS_2_WARNING: "true"

python:
  install:
    - requirements: docs/requirements.txt

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
