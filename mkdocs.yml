# MkDocs site — built on Read the Docs and locally via:
#   pip install -r docs/requirements.txt && ./scripts/build-docs.sh
#   ./scripts/serve-docs.sh   # local preview
# CI / RTD set DISABLE_MKDOCS_2_WARNING=true (see scripts/build-docs.sh).
#
# Heavy plugins are off by default (local/CI fast path). Enabled on Read the
# Docs (READTHEDOCS=True) or locally with:
#   ENABLE_GIT_REVISION_DATE=true ./scripts/build-docs.sh   # page stamps
#   ENABLE_MKDOCS_MINIFY=true ./scripts/build-docs.sh       # HTML minify
# `--strict` itself is cheap; cost is page render + optional plugins.

site_name: OntoCode
site_description: Ontology-as-code for Git and VS Code — OntoCore engine and OntoCode extension docs
site_url: https://ontocode-vs.readthedocs.io/
repo_url: https://github.com/eddiethedean/ontocode
repo_name: eddiethedean/ontocode
edit_uri: edit/main/docs/  # default branch (main); RTD "Edit this page" opens main
copyright: OntoCode documentation · <a href="SHIPPED/">What ships today</a> (canonical capability matrix)

docs_dir: docs
strict: true
# Only the GitHub entrypoint at docs/README.md — do not exclude nested */README.md
# (those are real pages; excluding them floods the build with broken-link noise).
exclude_docs: |
  /README.md
  /ui/
  /platform/
  /cursor-prompts/
  /PROTEGE_REVERSE_ENGINEERING/
  /protege-parity/
  /design/PLUGIN_SPEC.md
  /hooks/
  /OntoCode_UI_Vision_and_Roadmap.zip

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn
    unrecognized_links: warn

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: blue
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - git-revision-date-localized:
      # Local/CI: off (fast). RTD / opt-in: on (published "last updated" stamps).
      enabled: !ENV [ENABLE_GIT_REVISION_DATE, READTHEDOCS, false]
      type: timeago
      # Creation dates compare first vs last commit and warn on new/untracked pages.
      enable_creation_date: false
      fallback_to_build_date: true
      enable_git_follow: false
      # "No git logs" for brand-new pages must not fail `mkdocs build --strict`.
      strict: false
  - minify:
      # Local/CI: off (~2× faster). RTD / opt-in: on (smaller published HTML).
      minify_html: !ENV [ENABLE_MKDOCS_MINIFY, READTHEDOCS, false]
  - redirects:
      redirect_maps:
        guides/start-here.md: guides/first-success.md
        guides/query-workbench.md: ontocode/query-workbench.md
        guides/manchester-editor.md: ontocode/manchester-editor.md
        guides/graph-visualization.md: ontocode/graph-view.md
        guides/vscode-extension.md: ontocode/vscode-extension.md
        # Legacy “getting started” bookmarks → IDE tutorial (not cargo CLI)
        getting-started.md: guides/first-success.md

extra_css:
  - stylesheets/extra.css

# Local hooks (paths relative to mkdocs.yml / repo root). Fix git-revision stamps
# before plugins run — see docs/hooks/fix_git_revision_diff_filter.py.
hooks:
  - docs/hooks/fix_git_revision_diff_filter.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

