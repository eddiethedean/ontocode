# MkDocs site — built on Read the Docs and locally via:
#   pip install -r docs/requirements.txt && mkdocs serve

site_name: OntoCode
site_description: Ontology-as-code for Git and VS Code — OntoIndex engine and OntoCode extension docs
site_url: https://onto-code.readthedocs.io/
repo_url: https://github.com/eddiethedean/ontocode
repo_name: eddiethedean/ontocode
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: blue
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
      - Start here: guides/start-here.md
      - First success (10 min): guides/first-success.md
      - Ontology concepts: concepts.md
      - Install VS Code: vscode-install.md
      - CLI getting started: getting-started.md
      - Best practices: guides/best-practices.md
  - Guides:
      - What ships today: SHIPPED.md
      - Reasoner: guides/reasoner.md
      - Query Workbench: guides/query-workbench.md
      - Manchester editor: guides/manchester-editor.md
      - Authoring (Turtle): authoring.md
      - Protégé coexistence: guides/protege-coexistence.md
      - Rust library: guides/rust-library.md
      - Patch JSON: patch-reference.md
      - CI integration: ci-integration.md
      - Enterprise evaluation: guides/enterprise-eval.md
  - Reference:
